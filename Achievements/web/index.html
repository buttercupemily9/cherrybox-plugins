<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Achievements</title>
  <link rel="stylesheet" href="cherrybox/stock-plugin.css" />
  <link rel="stylesheet" href="plugin-ui.css" />
  <script src="cherrybox/cherrybox-plugin-shell.js" defer></script>
  <script src="cherrybox/cherrybox-plugin-api.js" defer></script>
  <script src="plugin-api.js" defer></script>
</head>
<body>
  <div class="card achievements-page">
    <header class="achievements-hero">
      <div class="achievements-hero__copy">
        <h1>Achievements</h1>
        <p class="meta">Unlock badges by watching, pulsing, favoriting, and rating inside CherryBox.</p>
      </div>
      <div class="achievements-hero__stats">
        <div class="achievements-ring" id="progress-ring" style="--progress: 0%">
          <div class="achievements-ring__inner">
            <span id="progress-percent">0%</span>
          </div>
        </div>
        <div class="achievements-hero__counts">
          <strong id="unlocked-count">0</strong>
          <span><span id="total-count">0</span> total badges</span>
        </div>
      </div>
    </header>

    <div class="achievements-overall" aria-hidden="true">
      <div class="achievements-overall__label">
        <span>Collection progress</span>
        <span id="overall-progress-label">0 / 0</span>
      </div>
      <div class="achievements-overall__bar">
        <div class="achievements-overall__fill" id="overall-progress-fill" style="width: 0%"></div>
      </div>
    </div>

    <div id="message" class="plugin-message" hidden></div>

    <div class="achievements-toolbar">
      <div class="achievement-filter" id="category-filter"></div>
      <button type="button" id="sync-btn" class="secondary">Refresh progress</button>
    </div>

    <div id="achievements"></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (window.CherryBoxPluginApi) {
        CherryBoxPluginApi.initCherryBoxPlugin().catch(function (err) {
          console.warn('CherryBox plugin theme init failed', err);
        });
      }

      var ui = window.AchievementsPluginUi;
      if (!ui) return;

      var api = ui.api;
      var escapeHtml = ui.escapeHtml;
      var formatTime = ui.formatTime;
      var messageEl = document.getElementById('message');
      var allAchievements = [];
      var activeCategory = 'All';

      var categoryOrder = ['Watching', 'Stories', 'Engagement', 'Collection', 'Ratings'];

      function showMessage(text, isError) {
        messageEl.hidden = false;
        messageEl.textContent = text;
        messageEl.className = 'plugin-message' + (isError ? ' error' : '');
      }

      function formatShortDate(value) {
        if (!value) return '';
        return new Date(value).toLocaleDateString(undefined, {
          month: 'short',
          day: 'numeric',
          year: 'numeric',
        });
      }

      function updateSummary(summary) {
        var unlocked = summary.unlockedCount || 0;
        var total = summary.totalCount || 0;
        var percent = total > 0 ? Math.round((unlocked / total) * 100) : 0;

        document.getElementById('unlocked-count').textContent = String(unlocked);
        document.getElementById('total-count').textContent = String(total);
        document.getElementById('progress-percent').textContent = percent + '%';
        document.getElementById('progress-ring').style.setProperty('--progress', percent + '%');
        document.getElementById('overall-progress-label').textContent = unlocked + ' / ' + total;
        document.getElementById('overall-progress-fill').style.width = percent + '%';
      }

      function renderFilters(categories) {
        var filterEl = document.getElementById('category-filter');
        var buttons = ['All'].concat(categories);
        filterEl.innerHTML = buttons.map(function (category) {
          return (
            '<button type="button" data-category="' + escapeHtml(category) + '"' +
            (category === activeCategory ? ' class="active"' : '') + '>' +
            escapeHtml(category) +
            '</button>'
          );
        }).join('');

        filterEl.querySelectorAll('button').forEach(function (button) {
          button.addEventListener('click', function () {
            activeCategory = button.getAttribute('data-category') || 'All';
            renderFilters(categories);
            renderAchievements();
          });
        });
      }

      function renderCard(item) {
        var percent = item.target > 0 ? Math.min(100, Math.round((item.progress / item.target) * 100)) : 0;
        return (
          '<article class="achievement-card' + (item.unlocked ? ' unlocked' : ' locked') + '" data-category="' + escapeHtml(item.category) + '">' +
            '<div class="achievement-card__icon" aria-hidden="true"></div>' +
            '<div class="achievement-card__body">' +
              '<div class="achievement-card__header">' +
                '<h3 class="achievement-card__title">' + escapeHtml(item.title) + '</h3>' +
                '<span class="achievement-card__badge">' + (item.unlocked ? 'Unlocked' : 'Locked') + '</span>' +
              '</div>' +
              '<p class="achievement-card__description">' + escapeHtml(item.description) + '</p>' +
              '<div class="achievement-card__progress">' +
                '<div class="achievement-card__progress-bar" role="progressbar" aria-valuenow="' + item.progress + '" aria-valuemin="0" aria-valuemax="' + item.target + '" aria-label="' + escapeHtml(item.title) + ' progress">' +
                  '<div class="achievement-card__progress-fill" style="width:' + percent + '%"></div>' +
                '</div>' +
                '<div class="achievement-card__progress-footer">' +
                  '<span class="achievement-card__progress-label">' + item.progress + ' / ' + item.target + '</span>' +
                  '<span class="achievement-card__progress-percent">' + percent + '%</span>' +
                '</div>' +
              '</div>' +
              (item.unlockedAt
                ? '<p class="achievement-card__unlocked-at meta">Unlocked ' + escapeHtml(formatShortDate(item.unlockedAt)) + '</p>'
                : '') +
            '</div>' +
          '</article>'
        );
      }

      function groupCategories(items) {
        var byCategory = {};
        items.forEach(function (item) {
          if (!byCategory[item.category]) byCategory[item.category] = [];
          byCategory[item.category].push(item);
        });

        var ordered = categoryOrder.filter(function (category) { return byCategory[category]; });
        Object.keys(byCategory).forEach(function (category) {
          if (ordered.indexOf(category) < 0) ordered.push(category);
        });
        return ordered.map(function (category) {
          return { category: category, items: byCategory[category] };
        });
      }

      function renderAchievements() {
        var el = document.getElementById('achievements');
        var items = activeCategory === 'All'
          ? allAchievements
          : allAchievements.filter(function (item) { return item.category === activeCategory; });

        if (!items.length) {
          el.innerHTML = '<p class="achievements-empty meta">No achievements in this category yet.</p>';
          return;
        }

        if (activeCategory === 'All') {
          el.innerHTML = groupCategories(items).map(function (group) {
            var unlocked = group.items.filter(function (item) { return item.unlocked; }).length;
            return (
              '<section class="achievement-section">' +
                '<header class="achievement-section__header">' +
                  '<h2 class="achievement-section__title" data-category="' + escapeHtml(group.category) + '">' + escapeHtml(group.category) + '</h2>' +
                  '<span class="achievement-section__count meta">' + unlocked + ' / ' + group.items.length + ' unlocked</span>' +
                '</header>' +
                '<div class="achievement-grid">' + group.items.map(renderCard).join('') + '</div>' +
              '</section>'
            );
          }).join('');
          return;
        }

        el.innerHTML = '<div class="achievement-grid">' + items.map(renderCard).join('') + '</div>';
      }

      async function refresh() {
        var results = await Promise.all([api.listAchievements(), api.getAchievementSummary()]);
        allAchievements = results[0];
        var summary = results[1];
        updateSummary(summary);
        var categories = Array.from(new Set(allAchievements.map(function (item) { return item.category; }))).sort();
        renderFilters(categories);
        renderAchievements();
      }

      document.getElementById('sync-btn').addEventListener('click', async function () {
        var button = document.getElementById('sync-btn');
        button.disabled = true;
        try {
          var unlocks = await api.syncAchievements();
          await refresh();
          if (unlocks.length) {
            showMessage('Unlocked ' + unlocks.length + ' new achievement' + (unlocks.length === 1 ? '' : 's') + '!');
          } else {
            showMessage('Progress refreshed.');
          }
        } catch (err) {
          showMessage(err.message, true);
        } finally {
          button.disabled = false;
        }
      });

      refresh().catch(function (err) {
        showMessage(err.message, true);
      });
    });
  </script>
</body>
</html>
