name: Build and release plugins

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: plugin-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cherrybox-plugins
        uses: actions/checkout@v4

      - name: Verify cherrybox access token
        shell: bash
        run: |
          if [ -z "${{ secrets.CHERRYBOX_REPO_TOKEN }}" ]; then
            echo "::error::Repository secret CHERRYBOX_REPO_TOKEN is not set."
            echo "Create a fine-grained GitHub PAT with read access to buttercupemily9/cherrybox,"
            echo "then add it as a secret named CHERRYBOX_REPO_TOKEN on this repository."
            echo "See plugins/docs/ci-setup.md for details."
            exit 1
          fi

      - name: Checkout cherrybox (plugin build dependencies)
        uses: actions/checkout@v4
        with:
          repository: buttercupemily9/cherrybox
          ref: dev
          path: _cherrybox
          token: ${{ secrets.CHERRYBOX_REPO_TOKEN }}

      - name: Verify cherrybox checkout
        shell: bash
        run: |
          if [ ! -f _cherrybox/src/CherryBox.Core/CherryBox.Core.csproj ]; then
            echo "::error::cherrybox checkout did not produce expected sources."
            echo "Confirm CHERRYBOX_REPO_TOKEN has read access to buttercupemily9/cherrybox on branch dev."
            exit 1
          fi

      - name: Verify cherrybox plugin API compatibility
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          if [ ! -f _cherrybox/src/CherryBox.Core/Configuration/SiteAuthConfig.cs ]; then
            echo "::error::cherrybox dev is missing unified site auth (SiteAuthConfig.cs)."
            missing=1
          fi
          contracts=_cherrybox/src/CherryBox.Plugins.Abstractions/DownloadContracts.cs
          if ! grep -q 'GetSupportedLoginSites' "$contracts"; then
            echo "::error::cherrybox dev is missing updated download site-login contracts."
            missing=1
          fi
          if grep -q 'ListSiteAuthAsync' "$contracts"; then
            echo "::error::cherrybox dev still exposes legacy download site-auth CRUD APIs."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "Push cherrybox dev first, then re-run this workflow."
            echo "Required cherrybox commit includes unified site logins (7424b44 or newer)."
            exit 1
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Sync plugin theme assets
        shell: pwsh
        run: ./sync-cherrybox-theme.ps1 -Source _cherrybox/web/public/skins

      - name: Build plugins
        run: dotnet build CherryBox.Plugins.slnx -c Release

      - name: Package plugins
        shell: pwsh
        run: ./build-packages.ps1 -ThemeSource _cherrybox/web/public/skins

      - name: Verify packages
        shell: pwsh
        run: |
          $packages = Get-ChildItem packages/*.zip
          if ($packages.Count -eq 0) { throw "No plugin packages were produced." }
          $packages | ForEach-Object { Write-Host "Package:" $_.Name "(" $_.Length "bytes)" }

          $store = Get-Content store.json -Raw | ConvertFrom-Json
          $expected = @($store.plugins | ForEach-Object { "$($_.id).zip" })
          $built = @($packages | ForEach-Object { $_.Name })
          $missing = $expected | Where-Object { $_ -notin $built }
          if ($missing.Count -gt 0) {
            throw "Missing packages for store catalog entries: $($missing -join ', ')"
          }

      - name: Upload build artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: plugin-packages
          path: packages/*.zip
          retention-days: 14
          if-no-files-found: error

      - name: Publish latest release
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: latest
          name: Latest plugin packages
          commit: ${{ github.sha }}
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          artifactContentType: application/zip
          artifacts: packages/*.zip
          artifactErrorsFailBuild: true
          body: |
            Rolling plugin release for CherryBox **Settings → Store**.

            - Built from [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            - Branch: `main`
            - Download pattern: `https://github.com/buttercupemily9/cherrybox-plugins/releases/latest/download/{plugin-id}.zip`
