<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Story covers</title>
  <link rel="stylesheet" href="cherrybox/stock-plugin.css" />
  <style>
    .inline { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0.75rem; }
    .success { color: #1b5e20; background: #e6f4ea; border: 1px solid #2f7d32; padding: 0.65rem 0.85rem; border-radius: 8px; margin-top: 0.75rem; }
    .error { color: #b71c1c; background: #fdecea; border: 1px solid #c62828; padding: 0.65rem 0.85rem; border-radius: 8px; margin-top: 0.75rem; }
    .job-list { margin-top: 1rem; max-height: 280px; overflow: auto; }
    .job-row { padding: 0.5rem 0; border-bottom: 1px solid rgba(0,0,0,0.08); font-size: 0.92rem; }
  </style>
  <script src="cherrybox/cherrybox-plugin-shell.js" defer></script>
  <script src="cherrybox/cherrybox-plugin-api.js" defer></script>
  <script src="plugin-api.js" defer></script>
  <script src="settings-page.js" defer></script>
</head>
<body>
  <div class="card">
    <h3>Story covers</h3>
    <p class="meta">Generate AI book-cover artwork for stories using the story text for context. Covers include the title and author. When audio is linked to a story, the same artwork is copied to the audio item. Requires the AI plugin with a Venice API key.</p>

    <div id="message"></div>

    <form id="settingsForm">
      <div class="inline">
        <input id="backgroundWorkerEnabled" type="checkbox" checked />
        <label for="backgroundWorkerEnabled">Run background cover worker</label>
      </div>
      <div class="inline">
        <input id="autoGenerateOnIndex" type="checkbox" checked />
        <label for="autoGenerateOnIndex">Auto-queue when a story is indexed</label>
      </div>
      <div class="inline">
        <input id="skipWhenCoverExists" type="checkbox" checked />
        <label for="skipWhenCoverExists">Skip stories that already have cover art</label>
      </div>
      <div class="inline">
        <input id="useChatPromptRefinement" type="checkbox" checked />
        <label for="useChatPromptRefinement">Use AI chat to refine image prompts from story text</label>
      </div>

      <div class="grid">
        <div class="form-row">
          <label for="imageWidth">Cover width (px)</label>
          <input id="imageWidth" type="number" min="256" max="2048" step="64" value="768" />
        </div>
        <div class="form-row">
          <label for="imageHeight">Cover height (px)</label>
          <input id="imageHeight" type="number" min="256" max="2048" step="64" value="1024" />
        </div>
        <div class="form-row">
          <label for="contextCharLimit">Story context chars</label>
          <input id="contextCharLimit" type="number" min="500" max="8000" step="100" value="2500" />
        </div>
      </div>

      <button type="submit">Save settings</button>
    </form>

    <div class="settings-subsection">
      <h4>Queue</h4>
      <p class="meta" id="workerStatus">Worker status loading…</p>
      <div style="display:flex;flex-wrap:wrap;gap:0.65rem;margin-top:0.5rem;">
        <button type="button" id="enqueueAllBtn" class="secondary">Queue all stories missing covers</button>
        <button type="button" id="startWorkerBtn" class="secondary">Start worker</button>
        <button type="button" id="stopWorkerBtn" class="secondary">Stop worker</button>
      </div>
      <div class="job-list" id="jobList"></div>
    </div>
  </div>
</body>
</html>
