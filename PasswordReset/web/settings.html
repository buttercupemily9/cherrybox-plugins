<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password reset settings</title>
  <link rel="stylesheet" href="cherrybox/stock-plugin.css" />
  <style>
    h3, h4 { margin-top: 0; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 0.75rem; }
    .inline { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.85rem; }
    .success { color: #2f7d32; margin-top: 0.75rem; }
  </style>
  <script src="cherrybox/cherrybox-plugin-shell.js" defer></script>
  <script src="cherrybox/cherrybox-plugin-api.js" defer></script>
  <script src="plugin-api.js" defer></script>
</head>
<body>
  <div class="card">
    <h3>Password reset</h3>
    <p class="meta">Let users reset their password from the login page. Configure SMTP under Settings → Email settings first. Users need an email on their account (Account tab) or a username that looks like an email address.</p>

    <form id="settingsForm" novalidate>
      <div class="inline">
        <input id="enabled" type="checkbox" />
        <label for="enabled">Enable password reset emails</label>
      </div>

      <div class="grid">
        <div class="form-row">
          <label for="publicBaseUrl">Public base URL</label>
          <input id="publicBaseUrl" type="text" placeholder="https://cherrybox.example.com" />
          <p class="meta">Also configurable under Settings → Dashboard → Server.</p>
        </div>
        <div class="form-row">
          <label for="tokenLifetimeMinutes">Reset link lifetime (minutes)</label>
          <input id="tokenLifetimeMinutes" type="number" min="5" max="1440" value="60" />
        </div>
      </div>

      <button type="submit">Save settings</button>
    </form>

    <div id="message"></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (window.CherryBoxPluginApi) {
        CherryBoxPluginApi.initCherryBoxPlugin().catch(function (err) {
          console.warn('CherryBox plugin theme init failed', err);
        });
      }
      window.PasswordResetPluginUi?.initPasswordResetSettingsUi();
    });
  </script>
</body>
</html>
