<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Library assignments</title>
  <link rel="stylesheet" href="cherrybox/stock-plugin.css" />
  <link rel="stylesheet" href="plugin-ui.css" />
  <script src="cherrybox/cherrybox-plugin-shell.js" defer></script>
  <script src="cherrybox/cherrybox-plugin-api.js" defer></script>
  <script src="plugin-api.js" defer></script>
  <script src="assignments-page.js" defer></script>
</head>
<body>
  <div class="card">
    <h1>Library assignments</h1>
    <p class="meta">Choose default and per-library transcode profiles. Resolution order: library override → profile binding → global default.</p>
    <div id="message" class="plugin-message" hidden></div>
    <form id="assignments-form">
      <div class="form-row inline"><label><input type="checkbox" id="globalEnabled" /> Transcoding enabled</label></div>
      <div class="form-row inline"><label><input type="checkbox" id="autoEnqueueOnScan" /> Auto-enqueue new/changed videos on scan</label></div>
      <div class="form-row inline"><label><input type="checkbox" id="backgroundWorkerEnabled" /> Background worker (24/7 queue processing)</label></div>
      <div class="form-row"><label for="globalDefaultProfileId">Global default profile</label><select id="globalDefaultProfileId"></select></div>
      <div class="settings-section">
        <h2>Per-library overrides</h2>
        <div id="overrides"></div>
        <button type="button" id="add-override" class="btn-secondary">Add library override</button>
      </div>
      <div class="actions"><button type="submit">Save assignments</button></div>
    </form>
  </div>
</body>
</html>
