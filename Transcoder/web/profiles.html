<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Transcode profiles</title>
  <link rel="stylesheet" href="cherrybox/stock-plugin.css" />
  <link rel="stylesheet" href="plugin-ui.css" />
  <script src="cherrybox/cherrybox-plugin-shell.js" defer></script>
  <script src="cherrybox/cherrybox-plugin-api.js" defer></script>
  <script src="plugin-api.js" defer></script>
</head>
<body>
  <div class="card">
    <h1>Transcode profiles</h1>
    <p class="meta">Define output container, codecs, bitrates, and quality settings. Import/export JSON to share profiles.</p>
    <div id="message" class="plugin-message" hidden></div>
    <div class="actions">
      <button type="button" id="new-btn">New profile</button>
      <label class="btn-secondary" style="cursor:pointer;display:inline-block;padding:0.45rem 0.85rem;border-radius:8px;">
        Import JSON
        <input id="import-file" type="file" accept="application/json,.json" hidden />
      </label>
    </div>
    <div class="settings-section">
      <table class="data-table" id="profiles-table">
        <thead><tr><th>Name</th><th>Container</th><th>Video</th><th>Audio</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="settings-section" id="editor" hidden>
      <h2 id="editor-title">Edit profile</h2>
      <form id="profile-form">
        <input type="hidden" id="profile-id" />
        <div class="form-row"><label for="name">Name</label><input id="name" required /></div>
        <div class="form-row"><label for="container">Container</label>
          <select id="container"><option value="mp4">MP4</option><option value="mkv">MKV</option><option value="avi">AVI</option><option value="webm">WebM</option></select>
        </div>
        <div class="form-row"><label for="videoCodec">Video codec</label>
          <select id="videoCodec"><option value="h264">H.264</option><option value="h265">H.265</option><option value="h266">H.266 (experimental)</option><option value="av1">AV1</option><option value="vp8">VP8</option><option value="vp9">VP9</option><option value="mpeg4">MPEG-4</option><option value="mpeg2">MPEG-2</option></select>
        </div>
        <div class="form-row"><label for="rateControl">Rate control</label>
          <select id="rateControl"><option value="quality">Quality (CRF)</option><option value="fileSizeTarget">Target file size</option><option value="constantBitrate">Constant bitrate</option></select>
        </div>
        <div class="form-row"><label for="crf">CRF</label><input id="crf" type="number" min="0" max="51" value="23" /></div>
        <div class="form-row"><label for="videoBitrate">Video bitrate (kbps)</label><input id="videoBitrate" type="number" min="64" step="64" /></div>
        <div class="form-row"><label for="fileSizeTarget">Target file size (MB)</label><input id="fileSizeTarget" type="number" min="1" step="1" /></div>
        <div class="form-row"><label for="maxWidth">Max width</label><input id="maxWidth" type="number" min="0" value="1920" /></div>
        <div class="form-row"><label for="maxHeight">Max height</label><input id="maxHeight" type="number" min="0" value="1080" /></div>
        <div class="form-row"><label for="audioCodec">Audio codec</label>
          <select id="audioCodec"><option value="aac">AAC</option><option value="mp3">MP3</option><option value="opus">Opus</option><option value="vorbis">Vorbis</option><option value="ac3">AC3</option><option value="flac">FLAC</option></select>
        </div>
        <div class="form-row"><label for="channels">Audio channels</label><input id="channels" type="number" min="1" max="8" value="2" /></div>
        <div class="form-row"><label for="audioBitrate">Audio bitrate (kbps)</label><input id="audioBitrate" type="number" min="32" step="32" value="128" /></div>
        <div class="form-row"><label for="sampleRate">Sample rate (Hz)</label><input id="sampleRate" type="number" min="8000" step="1000" value="48000" /></div>
        <div class="form-row inline"><label><input type="checkbox" id="skipIfCompatible" checked /> Skip if already compatible</label></div>
        <div class="actions">
          <button type="submit">Save profile</button>
          <button type="button" id="cancel-btn" class="btn-secondary">Cancel</button>
        </div>
      </form>
    </div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
    const msg = document.getElementById('message');
    const tbody = document.querySelector('#profiles-table tbody');
    const editor = document.getElementById('editor');
    function showMessage(text, kind = 'success') {
      msg.textContent = text;
      msg.className = `plugin-message ${kind}`;
      msg.hidden = false;
    }
    function pascalToCamel(s) { return s.charAt(0).toLowerCase() + s.slice(1); }
    function readForm() {
      return {
        name: document.getElementById('name').value.trim(),
        container: document.getElementById('container').value,
        video: {
          codec: document.getElementById('videoCodec').value,
          rateControl: document.getElementById('rateControl').value,
          crf: Number(document.getElementById('crf').value) || null,
          bitrateKbps: Number(document.getElementById('videoBitrate').value) || null,
          maxWidth: Number(document.getElementById('maxWidth').value) || null,
          maxHeight: Number(document.getElementById('maxHeight').value) || null,
        },
        audio: {
          codec: document.getElementById('audioCodec').value,
          channels: Number(document.getElementById('channels').value) || 2,
          bitrateKbps: Number(document.getElementById('audioBitrate').value) || 128,
          sampleRateHz: Number(document.getElementById('sampleRate').value) || 48000,
        },
        fileSizeTargetMB: Number(document.getElementById('fileSizeTarget').value) || null,
        skipIfCompatible: document.getElementById('skipIfCompatible').checked,
      };
    }
    function fillForm(profile) {
      document.getElementById('profile-id').value = profile?.id || '';
      document.getElementById('name').value = profile?.name || '';
      document.getElementById('container').value = pascalToCamel(profile?.container || 'mp4');
      document.getElementById('videoCodec').value = pascalToCamel(profile?.video?.codec || 'h264');
      document.getElementById('rateControl').value = pascalToCamel(profile?.video?.rateControl || 'quality');
      document.getElementById('crf').value = profile?.video?.crf ?? 23;
      document.getElementById('videoBitrate').value = profile?.video?.bitrateKbps ?? '';
      document.getElementById('fileSizeTarget').value = profile?.fileSizeTargetMB ?? '';
      document.getElementById('maxWidth').value = profile?.video?.maxWidth ?? 1920;
      document.getElementById('maxHeight').value = profile?.video?.maxHeight ?? 1080;
      document.getElementById('audioCodec').value = pascalToCamel(profile?.audio?.codec || 'aac');
      document.getElementById('channels').value = profile?.audio?.channels ?? 2;
      document.getElementById('audioBitrate').value = profile?.audio?.bitrateKbps ?? 128;
      document.getElementById('sampleRate').value = profile?.audio?.sampleRateHz ?? 48000;
      document.getElementById('skipIfCompatible').checked = profile?.skipIfCompatible ?? true;
      document.getElementById('editor-title').textContent = profile ? 'Edit profile' : 'New profile';
      editor.hidden = false;
    }
    async function refresh() {
      const profiles = await TranscodeApi.listProfiles();
      tbody.innerHTML = profiles.map(p => `<tr>
        <td>${p.name}</td><td>${p.container}</td><td>${p.video.codec}</td><td>${p.audio.codec}</td>
        <td>
          <button type="button" data-edit="${p.id}">Edit</button>
          <button type="button" data-export="${p.id}">Export</button>
          <button type="button" data-delete="${p.id}">Delete</button>
        </td></tr>`).join('');
    }
    document.getElementById('new-btn').onclick = () => fillForm(null);
    document.getElementById('cancel-btn').onclick = () => { editor.hidden = true; };
    document.getElementById('profile-form').onsubmit = async (e) => {
      e.preventDefault();
      const body = readForm();
      const id = document.getElementById('profile-id').value;
      if (id) await TranscodeApi.updateProfile(id, body); else await TranscodeApi.createProfile(body);
      editor.hidden = true;
      showMessage('Profile saved.');
      await refresh();
    };
    document.getElementById('import-file').onchange = async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const text = await file.text();
      await TranscodeApi.importProfile(text);
      showMessage('Profile imported.');
      await refresh();
    };
    tbody.onclick = async (e) => {
      const edit = e.target.getAttribute('data-edit');
      const del = e.target.getAttribute('data-delete');
      const exp = e.target.getAttribute('data-export');
      if (edit) {
        const profiles = await TranscodeApi.listProfiles();
        fillForm(profiles.find(p => p.id === edit));
      }
      if (del && confirm('Delete this profile?')) {
        await TranscodeApi.deleteProfile(del);
        showMessage('Profile deleted.');
        await refresh();
      }
      if (exp) {
        const data = await TranscodeApi.exportProfile(exp);
        const blob = new Blob([data.json], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'transcode-profile.json';
        a.click();
      }
    };
    refresh().catch(err => showMessage(err.message, 'error'));
    });
  </script>
</body>
</html>
