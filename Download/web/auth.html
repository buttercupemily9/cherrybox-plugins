<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Site logins</title>
  <link rel="stylesheet" href="plugin-ui.css" />
</head>
<body>
  <h1>Site logins</h1>
  <p class="meta">
    Add per-site credentials or cookie files for yt-dlp. CherryBox matches the site name against download URLs
    (typing <code>pornhub</code> applies to <code>pornhub.com</code> links).
  </p>
  <div id="message" class="plugin-message" hidden></div>

  <div class="settings-section">
    <h2>Add site</h2>
    <div class="form-row site-search-row">
      <label for="site-search">Site name</label>
      <input id="site-search" placeholder="e.g. pornhub" autocomplete="off" />
      <ul id="site-suggestions" class="site-suggestions" hidden></ul>
    </div>
    <button type="button" id="add-site-btn">Add site</button>
  </div>

  <div id="site-cards" class="site-cards"></div>

  <script src="plugin-api.js"></script>
  <script>
    const { api, escapeHtml, showMessage } = window.DownloadPluginUi;
    const messageEl = document.getElementById('message');

    const KNOWN_SITES = [
      'pornhub', 'xvideos', 'xhamster', 'onlyfans', 'fansly', 'youtube', 'vimeo',
      'twitter', 'instagram', 'reddit', 'twitch', 'bilibili', 'spankbang', 'eporner',
    ];

    const DEFAULT_TEST_URLS = {
      pornhub: 'https://www.pornhub.com/',
      xvideos: 'https://www.xvideos.com/',
      xhamster: 'https://xhamster.com/',
      onlyfans: 'https://onlyfans.com/',
      fansly: 'https://fansly.com/',
      youtube: 'https://www.youtube.com/feed/subscriptions',
      vimeo: 'https://vimeo.com/',
      twitter: 'https://x.com/',
      instagram: 'https://www.instagram.com/',
      reddit: 'https://www.reddit.com/',
      twitch: 'https://www.twitch.tv/',
      bilibili: 'https://www.bilibili.com/',
    };

    let siteAuth = [];
    const drafts = new Map();

    function normalizeSiteKey(value) {
      return String(value || '').toLowerCase().replace(/[^a-z0-9]/g, '');
    }

    function getDraft(siteKey) {
      if (!drafts.has(siteKey)) {
        const saved = siteAuth.find((entry) => entry.siteKey === siteKey);
        drafts.set(siteKey, {
          authMode: saved?.authMode || 'Credentials',
          username: saved?.username || '',
          password: '',
          testUrl: saved?.testUrl || DEFAULT_TEST_URLS[siteKey] || '',
          hasPassword: saved?.hasPassword || false,
          hasCookiesFile: saved?.hasCookiesFile || false,
        });
      }
      return drafts.get(siteKey);
    }

    function renderSuggestions(query) {
      const list = document.getElementById('site-suggestions');
      const normalized = normalizeSiteKey(query);
      if (!normalized) {
        list.hidden = true;
        list.innerHTML = '';
        return;
      }

      const configured = new Set(siteAuth.map((entry) => entry.siteKey));
      const matches = KNOWN_SITES
        .filter((site) => site.includes(normalized) && !configured.has(site))
        .slice(0, 8);

      if (!matches.length) {
        list.hidden = true;
        list.innerHTML = '';
        return;
      }

      list.innerHTML = matches.map((site) => `<li><button type="button" data-site="${site}">${site}</button></li>`).join('');
      list.hidden = false;
      list.querySelectorAll('button').forEach((button) => {
        button.addEventListener('click', () => {
          document.getElementById('site-search').value = button.getAttribute('data-site');
          list.hidden = true;
        });
      });
    }

    function renderSiteCards() {
      const container = document.getElementById('site-cards');
      if (!siteAuth.length) {
        container.innerHTML = '<p class="meta">No site logins configured yet. Search for a site above to get started.</p>';
        return;
      }

      container.innerHTML = siteAuth.map((entry) => {
        const draft = getDraft(entry.siteKey);
        const credentialsActive = draft.authMode === 'Credentials';
        return `
          <section class="site-card" data-site="${escapeHtml(entry.siteKey)}">
            <div class="site-card__header">
              <h2>${escapeHtml(entry.siteKey)}</h2>
              <button type="button" class="secondary danger" data-remove="${escapeHtml(entry.siteKey)}">Remove</button>
            </div>

            <div class="auth-mode-toggle">
              <label><input type="radio" name="auth-mode-${escapeHtml(entry.siteKey)}" value="Credentials" ${credentialsActive ? 'checked' : ''} /> Username &amp; password</label>
              <label><input type="radio" name="auth-mode-${escapeHtml(entry.siteKey)}" value="Cookies" ${!credentialsActive ? 'checked' : ''} /> Cookie file</label>
            </div>

            <div class="auth-panel ${credentialsActive ? '' : 'hidden'}" data-panel="credentials">
              <div class="form-row">
                <label>Username</label>
                <input type="text" data-field="username" value="${escapeHtml(draft.username)}" autocomplete="username" />
              </div>
              <div class="form-row">
                <label>Password</label>
                <input type="password" data-field="password" placeholder="${draft.hasPassword ? 'Leave blank to keep saved password' : 'Password'}" autocomplete="current-password" />
              </div>
            </div>

            <div class="auth-panel ${credentialsActive ? 'hidden' : ''}" data-panel="cookies">
              <p class="meta">${draft.hasCookiesFile ? 'Cookie file uploaded.' : 'No cookie file uploaded yet.'}</p>
              <div class="form-row">
                <label>Cookie file (Netscape format)</label>
                <input type="file" data-field="cookies" accept=".txt,text/plain" />
              </div>
            </div>

            <div class="form-row">
              <label>Test URL</label>
              <input type="url" data-field="testUrl" value="${escapeHtml(draft.testUrl)}" placeholder="https://…" />
              <p class="meta">A page on this site that requires login. yt-dlp uses <code>--simulate</code> to verify access.</p>
            </div>

            <div class="site-card__actions">
              <button type="button" data-test="${escapeHtml(entry.siteKey)}">Test login</button>
              <button type="button" class="secondary" data-save="${escapeHtml(entry.siteKey)}">Save</button>
            </div>
            <p class="meta test-result" data-test-result hidden></p>
          </section>`;
      }).join('');

      container.querySelectorAll('.site-card').forEach((card) => {
        const siteKey = card.getAttribute('data-site');
        const draft = getDraft(siteKey);

        card.querySelectorAll(`input[name="auth-mode-${siteKey}"]`).forEach((radio) => {
          radio.addEventListener('change', () => {
            draft.authMode = radio.value;
            card.querySelector('[data-panel="credentials"]').classList.toggle('hidden', draft.authMode !== 'Credentials');
            card.querySelector('[data-panel="cookies"]').classList.toggle('hidden', draft.authMode !== 'Cookies');
          });
        });

        card.querySelector('[data-field="username"]').addEventListener('input', (event) => {
          draft.username = event.target.value;
        });
        card.querySelector('[data-field="password"]').addEventListener('input', (event) => {
          draft.password = event.target.value;
        });
        card.querySelector('[data-field="testUrl"]').addEventListener('input', (event) => {
          draft.testUrl = event.target.value;
        });
        card.querySelector('[data-field="cookies"]')?.addEventListener('change', async (event) => {
          const file = event.target.files?.[0];
          if (!file) return;
          const resultEl = card.querySelector('[data-test-result]');
          resultEl.hidden = true;
          try {
            const updated = await api.uploadSiteCookies(siteKey, file);
            draft.hasCookiesFile = updated.hasCookiesFile;
            draft.authMode = 'Cookies';
            showMessage(messageEl, `Cookie file saved for ${siteKey}`);
            await refreshSiteAuth();
          } catch (err) {
            showMessage(messageEl, err.message, true);
          } finally {
            event.target.value = '';
          }
        });

        card.querySelector('[data-save]').addEventListener('click', async () => {
          const button = card.querySelector('[data-save]');
          button.disabled = true;
          try {
            const payload = {
              siteKey,
              authMode: draft.authMode,
              username: draft.username || null,
              testUrl: draft.testUrl || null,
            };
            if (draft.password) payload.password = draft.password;
            const updated = await api.upsertSiteAuth(payload);
            draft.hasPassword = updated.hasPassword;
            draft.hasCookiesFile = updated.hasCookiesFile;
            draft.password = '';
            showMessage(messageEl, `Saved login for ${siteKey}`);
            await refreshSiteAuth();
          } catch (err) {
            showMessage(messageEl, err.message, true);
          } finally {
            button.disabled = false;
          }
        });

        card.querySelector('[data-test]').addEventListener('click', async () => {
          const button = card.querySelector('[data-test]');
          const resultEl = card.querySelector('[data-test-result]');
          button.disabled = true;
          resultEl.hidden = true;
          try {
            const result = await api.testSiteAuth({
              siteKey,
              authMode: draft.authMode,
              username: draft.username || null,
              testUrl: draft.testUrl || null,
              password: draft.password || null,
            });
            resultEl.textContent = result.message;
            resultEl.className = result.success ? 'meta test-result success' : 'meta test-result error';
            resultEl.hidden = false;
          } catch (err) {
            resultEl.textContent = err.message;
            resultEl.className = 'meta test-result error';
            resultEl.hidden = false;
          } finally {
            button.disabled = false;
          }
        });

        card.querySelector('[data-remove]').addEventListener('click', async () => {
          if (!confirm(`Remove login settings for ${siteKey}?`)) return;
          try {
            await api.removeSiteAuth(siteKey);
            drafts.delete(siteKey);
            showMessage(messageEl, `Removed ${siteKey}`);
            await refreshSiteAuth();
          } catch (err) {
            showMessage(messageEl, err.message, true);
          }
        });
      });
    }

    async function refreshSiteAuth() {
      siteAuth = await api.listSiteAuth();
      renderSiteCards();
    }

    document.getElementById('site-search').addEventListener('input', (event) => {
      renderSuggestions(event.target.value);
    });

    document.getElementById('add-site-btn').addEventListener('click', async () => {
      const input = document.getElementById('site-search');
      const siteKey = normalizeSiteKey(input.value);
      if (!siteKey) {
        showMessage(messageEl, 'Enter a site name (e.g. pornhub).', true);
        return;
      }

      if (siteAuth.some((entry) => entry.siteKey === siteKey)) {
        showMessage(messageEl, `${siteKey} is already configured.`, true);
        return;
      }

      try {
        await api.upsertSiteAuth({
          siteKey,
          authMode: 'Credentials',
          username: null,
          password: null,
          testUrl: DEFAULT_TEST_URLS[siteKey] || null,
        });
        drafts.delete(siteKey);
        input.value = '';
        document.getElementById('site-suggestions').hidden = true;
        showMessage(messageEl, `Added ${siteKey}. Enter login details below.`);
        await refreshSiteAuth();
      } catch (err) {
        showMessage(messageEl, err.message, true);
      }
    });

    refreshSiteAuth().catch((err) => showMessage(messageEl, err.message, true));
  </script>
</body>
</html>
