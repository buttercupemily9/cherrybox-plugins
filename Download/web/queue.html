<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="utf-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Download settings</title>

  <link rel="stylesheet" href="cherrybox/stock-plugin.css" />

  <link rel="stylesheet" href="plugin-ui.css" />

  <script src="cherrybox/cherrybox-plugin-shell.js" defer></script>

  <script src="cherrybox/cherrybox-plugin-api.js" defer></script>

  <script src="plugin-api.js" defer></script>

</head>

<body>

  <div class="card download-page">

    <h1>Download settings</h1>

    <p class="meta">Configure retries and review download history. Use the Downloads tab in the sidebar to queue URLs and manage the active queue.</p>

    <div id="message" class="plugin-message" hidden></div>



    <div class="settings-section">

      <h2>Download settings</h2>

      <form id="settings-form">

        <p class="meta">Non-admin download access is managed per user in Account settings.</p>

        <div class="form-row">

          <label><input type="checkbox" id="auto-retry" /> Auto-retry failed downloads</label>

        </div>

        <div class="form-row">

          <label for="retry-minutes">Retry after (minutes)</label>

          <input id="retry-minutes" type="number" min="1" step="1" value="60" />

        </div>

        <p class="meta" id="history-db"></p>

        <button type="submit" id="settings-btn">Save download settings</button>

      </form>

    </div>



    <div class="settings-section">

      <h2>Download history</h2>

      <div id="history"></div>

    </div>

  </div>



  <script>

    document.addEventListener('DOMContentLoaded', function () {

      if (window.CherryBoxPluginApi) {

        CherryBoxPluginApi.initCherryBoxPlugin().catch(function (err) {

          console.warn('CherryBox plugin theme init failed', err);

        });

      }



      var ui = window.DownloadPluginUi;

      if (!ui) {

        var messageEl = document.getElementById('message');

        if (messageEl) {

          messageEl.hidden = false;

          messageEl.textContent = 'Download plugin UI failed to load.';

          messageEl.className = 'plugin-message error';

        }

        return;

      }



      var api = ui.api;

      var formatTime = ui.formatTime;

      var escapeHtml = ui.escapeHtml;

      var showMessage = ui.showMessage;

      var messageEl = document.getElementById('message');



      function renderHistory(history) {

        var el = document.getElementById('history');

        if (!history.length) {

          el.innerHTML = '<p class="meta">No download history yet.</p>';

          return;

        }



        el.innerHTML =

          '<ul class="settings-list">' +

          history

            .map(function (entry) {

              return (

                '<li class="settings-list__row">' +

                '<strong>' +

                escapeHtml(entry.title ?? entry.originalUrl) +

                '</strong>' +

                '<p class="meta">' +

                formatTime(entry.downloadedAt) +

                '</p>' +

                '</li>'

              );

            })

            .join('') +

          '</ul>';

      }



      var currentSettings = null;



      async function refresh() {

        var results = await Promise.all([api.listDownloadHistory(), api.getDownloadSettings()]);

        var history = results[0];

        var settings = results[1];

        currentSettings = settings;

        renderHistory(history);

        document.getElementById('auto-retry').checked = settings.autoRetryFailedDownloads;

        document.getElementById('retry-minutes').value = settings.autoRetryDelayMinutes;

        document.getElementById('history-db').textContent =

          'History database: ' + settings.historyDatabaseFileName;

      }



      document.getElementById('settings-form').addEventListener('submit', async function (event) {

        event.preventDefault();

        var button = document.getElementById('settings-btn');

        button.disabled = true;

        try {

          await api.updateDownloadSettings({

            allowNonAdminUsers: currentSettings ? currentSettings.allowNonAdminUsers : false,

            autoRetryFailedDownloads: document.getElementById('auto-retry').checked,

            autoRetryDelayMinutes: Math.max(

              1,

              Number(document.getElementById('retry-minutes').value) || 1

            ),

          });

          showMessage(messageEl, 'Download settings saved');

        } catch (err) {

          showMessage(messageEl, err.message, true);

        } finally {

          button.disabled = false;

        }

      });



      refresh().catch(function (err) {

        showMessage(messageEl, err.message, true);

      });

    });

  </script>

</body>

</html>
