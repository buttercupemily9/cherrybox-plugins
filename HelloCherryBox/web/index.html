<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello CherryBox</title>
    <link rel="stylesheet" href="cherrybox/stock-plugin.css" />
    <script src="cherrybox/cherrybox-plugin-shell.js" defer></script>
    <script src="cherrybox/cherrybox-plugin-api.js" defer></script>
  </head>
  <body>
    <div class="card">
      <h1>Hello CherryBox</h1>
      <p class="meta">This plugin page uses the stock CherryBox plugin theme.</p>
      <div id="skin-picker"></div>
      <p>Core skin: <strong id="core-skin">—</strong></p>
      <button type="button" id="refresh">Refresh status</button>
    </div>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        CherryBoxPluginApi.initCherryBoxPlugin({
          mountSkinPicker: document.getElementById('skin-picker'),
        }).then(function (plugin) {
          document.getElementById('core-skin').textContent = plugin.getCoreSkin();
          document.getElementById('refresh').addEventListener('click', function () {
            document.getElementById('core-skin').textContent = plugin.getCoreSkin();
          });
        }).catch(function (error) {
          console.error(error);
        });
      });
    </script>
  </body>
</html>
