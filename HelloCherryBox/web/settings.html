<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello plugin settings</title>
    <script src="/skins/cherrybox-plugin-api.js" defer></script>
  </head>
  <body>
    <div class="card">
      <h2>Hello plugin settings</h2>
      <p class="meta">Settings tab with optional plugin-only skins.</p>
      <div id="skin-picker"></div>
    </div>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        CherryBoxPluginApi.initCherryBoxPlugin({
          mountSkinPicker: document.getElementById('skin-picker'),
        }).catch(function (error) {
          console.error(error);
        });
      });
    </script>
  </body>
</html>
